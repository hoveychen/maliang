name: build-server-image

# maliang 后端镜像 CI：推到 GitHub main 且改动 server/ 时，构建 server/Dockerfile
# 并推到 ghcr.io/hoveychen/maliang-server。muvee 端 image 类型项目开启 auto-deploy 后，
# 会盯住 :latest 的镜像 digest，一变即自动重部署。
# 构建上下文 = 仓库根（与 muvee 侧一致，Dockerfile 内 `COPY server/...` 依赖此）。

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/build-server-image.yml'
  workflow_dispatch: {}

env:
  IMAGE: ghcr.io/hoveychen/maliang-server

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          build-args: |
            GIT_SHA=${{ github.sha }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
